services:
  nginx:
    image: nginx:alpine
    container_name: diagnoai_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: diagnoai-api
    container_name: diagnoai_api_prod
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_worker:
    image: diagnoai-api
    container_name: diagnoai_celery_prod
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - .env
    depends_on:
      - api
    restart: always

  db:
    image: postgres:15-alpine
    container_name: diagnoai_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: diagnoai
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diagnoai_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
