version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: diagnoai_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagnoai_api_prod
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/diagnoai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    # No ports exposed to internet directly
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'


  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diagnoai_celery_prod
    command: celery -A app.celery_app worker -l info --concurrency=2
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD}@db:5432/diagnoai
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'

  db:
    image: postgres:15-alpine
    container_name: diagnoai_db_prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: diagnoai
    env_file:
      - .env
    # No ports exposed to host/internet
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: diagnoai_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
