worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Match the upload logic limit
    client_max_body_size 10M;

    upstream backend_api {
        server api:8000;
    }

    server {
        # [TODO: PRODUCTION DEPLOYMENT]
        # This configuration currently runs purely on HTTP (Port 80) for simplicity.
        # BEFORE going live, you MUST configure SSL/TLS (Port 443) using certificates
        # (e.g. Let's Encrypt / Certbot) and redirect all HTTP traffic to HTTPS.
        listen 80;
        server_name _;

        # Serve frontend
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Proxy to FastAPI
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
