worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Match the upload logic limit
    client_max_body_size 10M;

    upstream backend_api {
        server api:8000;
    }

    # HTTP redirect to HTTPS
    server {
        listen 80;
        server_name diagnoai.com www.diagnoai.com;
        
        # Certbot challenge location for ACME
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name diagnoai.com www.diagnoai.com;

        # Requires generating certs via Let's Encrypt / Certbot before Nginx boot in Prod
        ssl_certificate /etc/letsencrypt/live/diagnoai.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/diagnoai.com/privkey.pem;
        
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;
        
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Serve frontend
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Proxy to FastAPI
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
