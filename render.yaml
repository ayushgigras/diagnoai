services:
  - type: web
    name: diagnoai-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: ohio
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diagnoai-db
          property: connectionString
      - key: CELERY_BROKER_URL
        value: "redis://127.0.0.1:6379/0"
      - key: CELERY_RESULT_BACKEND
        value: "redis://127.0.0.1:6379/0"
      - key: APP_ENV
        value: production
      - key: ALLOWED_HOSTS
        value: diagnoai-api.onrender.com
      - key: BACKEND_CORS_ORIGINS
        value: '["https://diagnoai-frontend.onrender.com"]'
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ADMIN_REGISTRATION_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  - type: web
    name: diagnoai-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: "https://diagnoai-api.onrender.com/api"

databases:
  - name: diagnoai-db
    databaseName: diagnoai
    user: diagnoai_user
    plan: free
    region: ohio
